<section class="section contacts" id="contacts">
  <div class="container">
    <div class="contacts-header">
      <p class="contacts-label">Connect</p>

      <div class="contacts-headline">
        <h2 class="contacts-title">Order your unique jewelry</h2>
        <p class="contacts-descr">We’d love to hear more details from you!</p>
      </div>
    </div>

    <div class="contacts-content">
      <address class="contacts-address">
        <ul class="contacts-list">
          <li class="contacts-item">
            <svg class="contacts-icon" width="32" height="32">
              <use href="/img/icons.svg#icon-envelope"></use>
            </svg>
            <div class="contacts-box">
              <p class="contacts-name">Email</p>
              <a class="contacts-link" href="mailto:info@handmadejewelry.com">
                info@handmadejewelry.com
              </a>
            </div>
          </li>

          <li class="contacts-item">
            <svg class="contacts-icon" width="32" height="32">
              <use href="/img/icons.svg#icon-phone"></use>
            </svg>
            <div class="contacts-box">
              <p class="contacts-name">Phone</p>
              <a class="contacts-link" href="tel:+15550000000">
                +1 (555) 000-0000
              </a>
            </div>
          </li>

          <li class="contacts-item">
            <svg class="contacts-icon" width="32" height="32">
              <use href="/img/icons.svg#icon-map"></use>
            </svg>
            <div class="contacts-box">
              <p class="contacts-name">Office</p>
              <a
                class="contacts-link"
                href="https://www.google.com/maps?q=76-80+Oakington+Manor+Dr,+London,+UK"
                target="_blank"
                rel="noopener noreferrer"
              >
                76-80 Oakington Manor Dr, London, UK
              </a>
            </div>
          </li>
        </ul>
      </address>

      <form class="contacts-form">
        <label class="contacts-field" for="user-name">Name*</label>
        <input
          class="contacts-input"
          id="user-name"
          type="text"
          name="user-name"
          placeholder="Tony"
          pattern="^[a-zA-Z\s\.]{5,28}$"
          title="Name must contain 5-28 letters, spaces or dots"
          required
        />
        <p class="contacts-error">
          Name must contain 5-28 letters, spaces or dots
        </p>

        <label class="contacts-field" for="user-phone">Phone*</label>
        <input
          class="contacts-input"
          id="user-phone"
          type="tel"
          name="user-phone"
          placeholder="+1 234 567 8900"
          pattern="^\+[0-9\s]{14}$"
          title="Phone format: +1 234 567 8900"
          required
        />
        <p class="contacts-error">Phone format: +1 234 567 8900</p>

        <label class="contacts-field" for="user-message">
          Describe what you want
        </label>
        <textarea
          class="contacts-textarea"
          id="user-message"
          name="user-message"
          placeholder="Type your message..."
          minlength="10"
          maxlength="500"
        ></textarea>

        <button class="btn contacts-btn" type="submit">Submit</button>
      </form>
    </div>
  </div>
</section>
