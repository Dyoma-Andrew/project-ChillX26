<section class="section order">
  <div class="container">
    <div class="order-header">
      <p class="order-label">Connect</p>
      <h2 class="order-title">Order your unique jewelry</h2>
      <p class="order-descr">We’d love to hear more details from you!</p>
    </div>

    <div class="order-content">
      <address class="order-contacts">
        <div class="order-contact-item">
          <svg class="order-contact-icon" width="24" height="24">
            <use href="/img/icons.svg#icon-mail"></use>
          </svg>
          <div class="order-contact-box">
            <p class="order-contact-title">Email</p>
            <a
              class="order-contact-link"
              href="mailto:info@handmadejewelry.com"
            >
              info@handmadejewelry.com
            </a>
          </div>
        </div>

        <div class="order-contact-item">
          <svg class="order-contact-icon" width="24" height="24">
            <use href="/img/icons.svg#icon-phone"></use>
          </svg>
          <div class="order-contact-box">
            <p class="order-contact-title">Phone</p>
            <a class="order-contact-link" href="tel:+15550000000">
              +1 (555) 000-0000
            </a>
          </div>
        </div>

        <div class="order-contact-item">
          <svg class="order-contact-icon" width="24" height="24">
            <use href="/img/icons.svg#icon-map"></use>
          </svg>
          <div class="order-contact-box">
            <p class="order-contact-title">Office</p>
            <a
              class="order-contact-link"
              href="https://www.google.com/maps?q=76-80+Oakington+Manor+Dr,+London,+UK"
              target="_blank"
              rel="noopener noreferrer"
            >
              76-80 Oakington Manor Dr, London, UK
            </a>
          </div>
        </div>
      </address>

      <form class="order-form">
        <label class="order-field">
          Name*
          <input
            class="order-input"
            type="text"
            name="user-name"
            placeholder="Tony"
            required
          />
        </label>

        <label class="order-field">
          Phone*
          <input
            class="order-input"
            type="tel"
            name="user-phone"
            placeholder="+1 234 567 8900"
            required
          />
        </label>

        <label class="order-field">
          Describe what you want
          <textarea
            class="order-textarea"
            name="user-message"
            placeholder="Type your message..."
          ></textarea>
        </label>

        <button class="order-btn" type="submit">Submit</button>
      </form>
    </div>
  </div>
</section>
